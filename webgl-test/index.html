<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGL Quad Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #top-bar {
    position: fixed; top: 0; left: 0; right: 0;
    background: #1a1a1a;
    padding: 8px 12px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    z-index: 1; font: 14px monospace; color: #ccc;
  }
  #top-bar label { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
  #top-bar select { font: 12px monospace; background: #333; color: #fff; border: 1px solid #666; padding: 2px 4px; }
  .btn-group { display: flex; gap: 2px; }
  .btn-group button { font: 12px monospace; padding: 2px 8px; background: #333; color: #ccc; border: 1px solid #666; cursor: pointer; }
  .btn-group button.active { background: #58a; color: #fff; border-color: #58a; }
  #hud { color: #0f0; font: 14px monospace; white-space: nowrap; }
</style>
</head>
<body>
<div id="top-bar">
  <span id="hud">FPS: -- | Frame: 0</span>
  <label>Quads: <span class="btn-group" id="bg-count">
    <button data-val="100">100</button>
    <button data-val="500" class="active">500</button>
    <button data-val="1000">1000</button>
  </span></label>
  <label>Size: <span class="btn-group" id="bg-size">
    <button data-val="50">50</button>
    <button data-val="100" class="active">100</button>
    <button data-val="200">200</button>
  </span></label>
  <label>Paint:
    <select id="sel-paint">
      <option value="solid">Solid Color</option>
      <option value="image">Image</option>
    </select>
  </label>
  <label>Filter:
    <select id="sel-filter">
      <option value="nearest">Nearest</option>
      <option value="bilinear">Bilinear</option>
    </select>
  </label>
</div>
<canvas id="c"></canvas>
<script>
"use strict";
const canvas = document.getElementById('c');
const hud = document.getElementById('hud');
const gl = canvas.getContext('webgl2', { antialias: false });
if (!gl) { hud.textContent = 'WebGL 2 not supported'; throw new Error('no webgl2'); }

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

// --- Shaders (instanced: a_corner is static unit quad, rest per-instance) ---
const vsSolid = `#version 300 es
layout(location=0) in vec2 a_corner;
layout(location=1) in vec2 a_center;
layout(location=2) in vec4 a_color;
uniform vec2 u_halfSize;
uniform float u_zoom;
uniform vec2 u_pan;
out vec4 v_color;
void main() {
  vec2 world = a_center + a_corner * u_halfSize;
  gl_Position = vec4((world - u_pan) * u_zoom, 0.0, 1.0);
  v_color = a_color;
}`;

const fsSolid = `#version 300 es
precision mediump float;
in vec4 v_color;
out vec4 fragColor;
void main() { fragColor = v_color; }`;

const vsTex = `#version 300 es
layout(location=0) in vec2 a_corner;
layout(location=1) in vec2 a_center;
layout(location=2) in float a_layer;
uniform vec2 u_halfSize;
uniform float u_zoom;
uniform vec2 u_pan;
out vec2 v_uv;
flat out float v_layer;
void main() {
  vec2 world = a_center + a_corner * u_halfSize;
  gl_Position = vec4((world - u_pan) * u_zoom, 0.0, 1.0);
  v_uv = a_corner * 0.5 + 0.5;
  v_layer = a_layer;
}`;

const fsTex = `#version 300 es
precision mediump float;
uniform mediump sampler2DArray u_tex;
in vec2 v_uv;
flat in float v_layer;
out vec4 fragColor;
void main() { fragColor = texture(u_tex, vec3(v_uv, v_layer)); }`;

function compile(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS))
    throw new Error(gl.getShaderInfoLog(sh));
  return sh;
}

function linkProgram(vsSrc, fsSrc) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, vsSrc));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS))
    throw new Error(gl.getProgramInfoLog(p));
  return p;
}

const progSolid = linkProgram(vsSolid, fsSolid);
const progTex = linkProgram(vsTex, fsTex);

// Cache uniform locations
const uSolidHalfSize = gl.getUniformLocation(progSolid, 'u_halfSize');
const uSolidZoom = gl.getUniformLocation(progSolid, 'u_zoom');
const uSolidPan = gl.getUniformLocation(progSolid, 'u_pan');
const uTexHalfSize = gl.getUniformLocation(progTex, 'u_halfSize');
const uTexZoom = gl.getUniformLocation(progTex, 'u_zoom');
const uTexPan = gl.getUniformLocation(progTex, 'u_pan');
const uTexSampler = gl.getUniformLocation(progTex, 'u_tex');

gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

// --- Procedural image generation (matching vello_bench2) ---
const NUM_IMAGES = 50;
const IMAGE_SIZE = 64;

function makeRng(seed) {
  let s = seed >>> 0;
  return {
    next() {
      s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
      s = s >>> 0;
      return s;
    },
    f64() { return this.next() / 0x100000000; },
    color() { return [this.f64(), this.f64(), this.f64()]; }
  };
}

function generateImages() {
  const rng = makeRng(0xCAFEBABE);
  const images = [];
  for (let i = 0; i < NUM_IMAGES; i++) {
    const c1 = rng.color();
    const c2 = rng.color();
    const freq = rng.f64() * 5.0 + 3.0;
    const cx = IMAGE_SIZE / 2;
    const cy = IMAGE_SIZE / 2;
    const maxDist = Math.sqrt(cx * cx + cy * cy);

    const pixels = new Uint8Array(IMAGE_SIZE * IMAGE_SIZE * 4);
    for (let y = 0; y < IMAGE_SIZE; y++) {
      for (let x = 0; x < IMAGE_SIZE; x++) {
        const dx = x - cx;
        const dy = y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const tSin = Math.sin(dist * freq * Math.PI * 2 / IMAGE_SIZE);
        const t = tSin * tSin;
        const alpha = 1.0 - 0.7 * (dist / maxDist);
        const a = Math.round(alpha * 255);
        const lerp = (a, b) => Math.round((a + (b - a) * t) * alpha * 255);
        const idx = (y * IMAGE_SIZE + x) * 4;
        pixels[idx    ] = lerp(c1[0], c2[0]);
        pixels[idx + 1] = lerp(c1[1], c2[1]);
        pixels[idx + 2] = lerp(c1[2], c2[2]);
        pixels[idx + 3] = a;
      }
    }
    images.push(pixels);
  }
  return images;
}

const generatedImages = generateImages();

const texArray = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D_ARRAY, texArray);
gl.texStorage3D(gl.TEXTURE_2D_ARRAY, 1, gl.RGBA8, IMAGE_SIZE, IMAGE_SIZE, NUM_IMAGES);
for (let i = 0; i < NUM_IMAGES; i++) {
  gl.texSubImage3D(gl.TEXTURE_2D_ARRAY, 0, 0, 0, i,
    IMAGE_SIZE, IMAGE_SIZE, 1, gl.RGBA, gl.UNSIGNED_BYTE, generatedImages[i]);
}
gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

// --- Static unit quad (uploaded once) ---
const cornerVBO = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, cornerVBO);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, -1,1, 1,-1, 1,1]), gl.STATIC_DRAW);

const quadEBO = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, quadEBO);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array([0,1,2, 2,1,3]), gl.STATIC_DRAW);

// --- Per-instance VBOs ---
const solidVBO = gl.createBuffer();  // [cx,cy, r,g,b,a] per instance
const texVBO = gl.createBuffer();    // [cx,cy, layer] per instance

// --- VAOs ---
const vaoSolid = gl.createVertexArray();
gl.bindVertexArray(vaoSolid);
  gl.bindBuffer(gl.ARRAY_BUFFER, cornerVBO);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, solidVBO);
  gl.enableVertexAttribArray(1);
  gl.vertexAttribPointer(1, 2, gl.FLOAT, false, 24, 0);
  gl.vertexAttribDivisor(1, 1);
  gl.enableVertexAttribArray(2);
  gl.vertexAttribPointer(2, 4, gl.FLOAT, false, 24, 8);
  gl.vertexAttribDivisor(2, 1);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, quadEBO);
gl.bindVertexArray(null);

const vaoTex = gl.createVertexArray();
gl.bindVertexArray(vaoTex);
  gl.bindBuffer(gl.ARRAY_BUFFER, cornerVBO);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, texVBO);
  gl.enableVertexAttribArray(1);
  gl.vertexAttribPointer(1, 2, gl.FLOAT, false, 12, 0);
  gl.vertexAttribDivisor(1, 1);
  gl.enableVertexAttribArray(2);
  gl.vertexAttribPointer(2, 1, gl.FLOAT, false, 12, 8);
  gl.vertexAttribDivisor(2, 1);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, quadEBO);
gl.bindVertexArray(null);

// --- Quad data ---
const quads = [];
let quadCount = 500;
let quadSizePx = 100;
let paintMode = 'solid';

function makeQuad() {
  const cx = -1 + Math.random() * 2;
  const cy = -1 + Math.random() * 2;
  const speed = 0.3 + Math.random() * 1.2;
  const angle = Math.random() * Math.PI * 2;
  const vx = Math.cos(angle) * speed;
  const vy = Math.sin(angle) * speed;
  const alpha = 0.3 + Math.random() * 0.5;
  const color = [Math.random(), Math.random(), Math.random(), alpha];
  const imageIdx = Math.floor(Math.random() * NUM_IMAGES);
  return { cx, cy, vx, vy, color, imageIdx };
}

function ensureQuads() {
  while (quads.length < quadCount) quads.push(makeQuad());
  quads.length = quadCount;
}

ensureQuads();

// --- Controls ---
const selPaint = document.getElementById('sel-paint');
const selFilter = document.getElementById('sel-filter');

function setupBtnGroup(id, onChange) {
  const group = document.getElementById(id);
  for (const btn of group.querySelectorAll('button')) {
    btn.addEventListener('click', () => {
      group.querySelector('.active').classList.remove('active');
      btn.classList.add('active');
      onChange(parseInt(btn.dataset.val));
    });
  }
}
setupBtnGroup('bg-count', (v) => { quadCount = v; ensureQuads(); });
setupBtnGroup('bg-size', (v) => { quadSizePx = v; });
selPaint.addEventListener('change', () => { paintMode = selPaint.value; });
selFilter.addEventListener('change', () => {
  const f = selFilter.value === 'bilinear' ? gl.LINEAR : gl.NEAREST;
  gl.bindTexture(gl.TEXTURE_2D_ARRAY, texArray);
  gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_MIN_FILTER, f);
  gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_MAG_FILTER, f);
});

// --- Zoom & Pan ---
let zoom = 1;
let panX = 0, panY = 0;
let dragging = false;
let dragLastX = 0, dragLastY = 0;

function screenToClip(sx, sy) {
  return [
    (sx / canvas.clientWidth) * 2 - 1,
    -((sy / canvas.clientHeight) * 2 - 1)
  ];
}

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const [cx, cy] = screenToClip(e.clientX, e.clientY);
  const wx = cx / zoom + panX;
  const wy = cy / zoom + panY;
  zoom *= e.deltaY > 0 ? 0.9 : 1.1;
  panX = wx - cx / zoom;
  panY = wy - cy / zoom;
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0) { dragging = true; dragLastX = e.clientX; dragLastY = e.clientY; }
});
window.addEventListener('mouseup', () => { dragging = false; });
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const dx = (e.clientX - dragLastX) / canvas.clientWidth * 2;
  const dy = -(e.clientY - dragLastY) / canvas.clientHeight * 2;
  panX -= dx / zoom;
  panY -= dy / zoom;
  dragLastX = e.clientX;
  dragLastY = e.clientY;
});

let touchStartDist = 0, touchStartZoom = 1;
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    dragging = true;
    dragLastX = e.touches[0].clientX;
    dragLastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    touchStartDist = Math.sqrt(dx * dx + dy * dy);
    touchStartZoom = zoom;
  }
}, { passive: true });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    const dx = (e.touches[0].clientX - dragLastX) / canvas.clientWidth * 2;
    const dy = -(e.touches[0].clientY - dragLastY) / canvas.clientHeight * 2;
    panX -= dx / zoom;
    panY -= dy / zoom;
    dragLastX = e.touches[0].clientX;
    dragLastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    zoom = touchStartZoom * Math.sqrt(dx * dx + dy * dy) / touchStartDist;
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; });

// --- Simulation + render ---
let frame = 0;
let lastTime = performance.now();
let windowStart = lastTime;
let windowFrames = 0;
let avgFps = 0;
let avgFrameTime = 0;

function tick(now) {
  frame++;
  const dt = now - lastTime;
  lastTime = now;
  const dtSec = dt * 0.001;

  windowFrames++;
  const elapsed = now - windowStart;
  if (elapsed >= 1000) {
    avgFrameTime = elapsed / windowFrames;
    avgFps = windowFrames * 1000 / elapsed;
    windowStart = now;
    windowFrames = 0;
  }
  hud.textContent = `FPS: ${avgFps.toFixed(1)} (${avgFrameTime.toFixed(1)}ms) | Frame: ${frame} | Quads: ${quadCount} | ${canvas.width}x${canvas.height}`;

  const hw = quadSizePx / canvas.width;
  const hh = quadSizePx / canvas.height;

  // Update positions (bounce off edges)
  for (let i = 0; i < quadCount; i++) {
    const q = quads[i];
    q.cx += q.vx * dtSec;
    q.cy += q.vy * dtSec;

    if (q.cx - hw < -1) { q.cx = -1 + hw; q.vx = Math.abs(q.vx); }
    if (q.cx + hw >  1) { q.cx =  1 - hw; q.vx = -Math.abs(q.vx); }
    if (q.cy - hh < -1) { q.cy = -1 + hh; q.vy = Math.abs(q.vy); }
    if (q.cy + hh >  1) { q.cy =  1 - hh; q.vy = -Math.abs(q.vy); }
  }

  gl.clearColor(0.1, 0.1, 0.1, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  if (paintMode === 'solid') {
    const data = new Float32Array(quadCount * 6);
    for (let i = 0; i < quadCount; i++) {
      const q = quads[i];
      const o = i * 6;
      data[o    ] = q.cx; data[o + 1] = q.cy;
      data[o + 2] = q.color[0]; data[o + 3] = q.color[1];
      data[o + 4] = q.color[2]; data[o + 5] = q.color[3];
    }
    gl.useProgram(progSolid);
    gl.uniform2f(uSolidHalfSize, hw, hh);
    gl.uniform1f(uSolidZoom, zoom);
    gl.uniform2f(uSolidPan, panX, panY);
    gl.bindVertexArray(vaoSolid);
    gl.bindBuffer(gl.ARRAY_BUFFER, solidVBO);
    gl.bufferData(gl.ARRAY_BUFFER, data, gl.DYNAMIC_DRAW);
    gl.drawElementsInstanced(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT, 0, quadCount);
  } else {
    const data = new Float32Array(quadCount * 3);
    for (let i = 0; i < quadCount; i++) {
      const q = quads[i];
      const o = i * 3;
      data[o    ] = q.cx; data[o + 1] = q.cy;
      data[o + 2] = q.imageIdx;
    }
    gl.useProgram(progTex);
    gl.uniform2f(uTexHalfSize, hw, hh);
    gl.uniform1f(uTexZoom, zoom);
    gl.uniform2f(uTexPan, panX, panY);
    gl.uniform1i(uTexSampler, 0);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D_ARRAY, texArray);
    gl.bindVertexArray(vaoTex);
    gl.bindBuffer(gl.ARRAY_BUFFER, texVBO);
    gl.bufferData(gl.ARRAY_BUFFER, data, gl.DYNAMIC_DRAW);
    gl.drawElementsInstanced(gl.TRIANGLES, 6, gl.UNSIGNED_SHORT, 0, quadCount);
  }

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);
</script>
</body>
</html>
