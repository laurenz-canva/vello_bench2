<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGL Quad Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #top-bar {
    position: fixed; top: 0; left: 0; right: 0;
    background: #1a1a1a;
    padding: 8px 12px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    z-index: 1; font: 14px monospace; color: #ccc;
  }
  #top-bar label { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
  #top-bar input[type="range"] { width: 100px; }
  #top-bar select { font: 12px monospace; background: #333; color: #fff; border: 1px solid #666; padding: 2px 4px; }
  #hud {
    color: #0f0; font: 14px monospace;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="top-bar">
  <span id="hud">FPS: -- | Frame: 0</span>
  <label>Quads: <input type="range" id="slider-count" min="1" max="2000" value="1000"> <span id="val-count">1000</span></label>
  <label>Size: <input type="range" id="slider-size" min="5" max="500" value="100"> <span id="val-size">100</span></label>
  <label>Paint:
    <select id="sel-paint">
      <option value="solid">Solid Color</option>
      <option value="image">Image</option>
    </select>
  </label>
  <label>Filter:
    <select id="sel-filter">
      <option value="nearest">Nearest</option>
      <option value="bilinear">Bilinear</option>
    </select>
  </label>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const hud = document.getElementById('hud');
const gl = canvas.getContext('webgl2', { antialias: false });
if (!gl) { hud.textContent = 'WebGL 2 not supported'; throw new Error('no webgl2'); }

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

// --- Shaders ---
const vsSolid = `#version 300 es
layout(location=0) in vec2 a_pos;
layout(location=1) in vec4 a_color;
uniform float u_zoom;
uniform vec2 u_pan;
out vec4 v_color;
void main() {
  gl_Position = vec4((a_pos - u_pan) * u_zoom, 0.0, 1.0);
  v_color = a_color;
}`;

const fsSolid = `#version 300 es
precision mediump float;
in vec4 v_color;
out vec4 fragColor;
void main() {
  fragColor = v_color;
}`;

const vsTexAtlas =`#version 300 es
layout(location=0) in vec2 a_pos;
layout(location=1) in vec2 a_uv;
layout(location=2) in float a_layer;
uniform float u_zoom;
uniform vec2 u_pan;
out vec2 v_uv;
flat out float v_layer;
void main() {
  gl_Position = vec4((a_pos - u_pan) * u_zoom, 0.0, 1.0);
  v_uv = a_uv;
  v_layer = a_layer;
}`;

const fsTexAtlas = `#version 300 es
precision mediump float;
uniform mediump sampler2DArray u_tex;
in vec2 v_uv;
flat in float v_layer;
out vec4 fragColor;
void main() {
  fragColor = texture(u_tex, vec3(v_uv, v_layer));
}`;

function compile(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS))
    throw new Error(gl.getShaderInfoLog(sh));
  return sh;
}

function linkProgram(vsSrc, fsSrc) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, vsSrc));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS))
    throw new Error(gl.getProgramInfoLog(p));
  return p;
}

const progSolid = linkProgram(vsSolid, fsSolid);
const progTex = linkProgram(vsTexAtlas, fsTexAtlas);

// Cache uniform locations
const uSolidZoom = gl.getUniformLocation(progSolid, 'u_zoom');
const uSolidPan = gl.getUniformLocation(progSolid, 'u_pan');
const uTexZoom = gl.getUniformLocation(progTex, 'u_zoom');
const uTexPan = gl.getUniformLocation(progTex, 'u_pan');
const uTexSampler = gl.getUniformLocation(progTex, 'u_tex');

gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

// --- Procedural image generation (matching vello_bench2) ---
const NUM_IMAGES = 50;
const IMAGE_SIZE = 64;

// Simple seeded RNG (matching vello_bench2's Rng)
function makeRng(seed) {
  let s = seed >>> 0;
  return {
    next() {
      s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
      s = s >>> 0;
      return s;
    },
    f64() {
      return this.next() / 0x100000000;
    },
    color() {
      return [this.f64(), this.f64(), this.f64()];
    }
  };
}

function generateImages() {
  const rng = makeRng(0xCAFEBABE);
  const images = [];
  for (let i = 0; i < NUM_IMAGES; i++) {
    const c1 = rng.color();
    const c2 = rng.color();
    const freq = rng.f64() * 5.0 + 3.0;
    const cx = IMAGE_SIZE / 2;
    const cy = IMAGE_SIZE / 2;
    const maxDist = Math.sqrt(cx * cx + cy * cy);

    const pixels = new Uint8Array(IMAGE_SIZE * IMAGE_SIZE * 4);
    for (let y = 0; y < IMAGE_SIZE; y++) {
      for (let x = 0; x < IMAGE_SIZE; x++) {
        const dx = x - cx;
        const dy = y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const tSin = Math.sin(dist * freq * Math.PI * 2 / IMAGE_SIZE);
        const t = tSin * tSin;
        const alpha = 1.0 - 0.7 * (dist / maxDist);
        const a = Math.round(alpha * 255);
        const lerp = (a, b) => Math.round((a + (b - a) * t) * alpha * 255);
        const idx = (y * IMAGE_SIZE + x) * 4;
        pixels[idx    ] = lerp(c1[0], c2[0]);
        pixels[idx + 1] = lerp(c1[1], c2[1]);
        pixels[idx + 2] = lerp(c1[2], c2[2]);
        pixels[idx + 3] = a;
      }
    }
    images.push(pixels);
  }
  return images;
}

const generatedImages = generateImages();

// Upload as 2D texture array
const texArray = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D_ARRAY, texArray);
gl.texStorage3D(gl.TEXTURE_2D_ARRAY, 1, gl.RGBA8, IMAGE_SIZE, IMAGE_SIZE, NUM_IMAGES);
for (let i = 0; i < NUM_IMAGES; i++) {
  gl.texSubImage3D(gl.TEXTURE_2D_ARRAY, 0, 0, 0, i, IMAGE_SIZE, IMAGE_SIZE, 1, gl.RGBA, gl.UNSIGNED_BYTE, generatedImages[i]);
}
gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

// --- VAOs ---
// Solid VAO: position (2f) + color (4f) = 6 floats/vert
const FLOATS_PER_VERT_SOLID = 6;
const vaoSolid = gl.createVertexArray();
gl.bindVertexArray(vaoSolid);
const vboSolid = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vboSolid);
const strideSolid = FLOATS_PER_VERT_SOLID * 4;
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, strideSolid, 0);
gl.enableVertexAttribArray(1);
gl.vertexAttribPointer(1, 4, gl.FLOAT, false, strideSolid, 2 * 4);
const eboSolid = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, eboSolid);

// Textured VAO: position (2f) + uv (2f) + layer (1f) = 5 floats/vert
const FLOATS_PER_VERT_TEX = 5;
const vaoTex = gl.createVertexArray();
gl.bindVertexArray(vaoTex);
const vboTex = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vboTex);
const strideTex = FLOATS_PER_VERT_TEX * 4;
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, strideTex, 0);
gl.enableVertexAttribArray(1);
gl.vertexAttribPointer(1, 2, gl.FLOAT, false, strideTex, 2 * 4);
gl.enableVertexAttribArray(2);
gl.vertexAttribPointer(2, 1, gl.FLOAT, false, strideTex, 4 * 4);
const eboTex = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, eboTex);

gl.bindVertexArray(null);

// --- Quad data ---
const quads = [];
let quadCount = 1000;
let quadSizePx = 100;
let paintMode = 'solid';

function makeQuad() {
  const hw = quadSizePx / canvas.width;
  const hh = quadSizePx / canvas.height;
  const cx = -1 + hw + Math.random() * (2 - 2 * hw);
  const cy = -1 + hh + Math.random() * (2 - 2 * hh);
  const speed = 0.3 + Math.random() * 1.2;
  const angle = Math.random() * Math.PI * 2;
  const vx = Math.cos(angle) * speed;
  const vy = Math.sin(angle) * speed;
  const alpha = 0.3 + Math.random() * 0.5;
  const color = [Math.random(), Math.random(), Math.random(), alpha];
  const imageIdx = Math.floor(Math.random() * NUM_IMAGES);
  return { hw, hh, cx, cy, vx, vy, color, imageIdx };
}

function ensureQuads() {
  while (quads.length < quadCount) quads.push(makeQuad());
  quads.length = quadCount;
  rebuildIndices();
}

function rebuildIndices() {
  const indices = [];
  for (let i = 0; i < quadCount; i++) {
    const base = i * 4;
    indices.push(base, base + 1, base + 2, base + 3);
    if (i < quadCount - 1) indices.push(0xFFFF);
  }
  const idxData = new Uint16Array(indices);
  // Update both EBOs
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, eboSolid);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, idxData, gl.STATIC_DRAW);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, eboTex);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, idxData, gl.STATIC_DRAW);
}

gl.enable(gl.PRIMITIVE_RESTART_FIXED_INDEX);
ensureQuads();

// --- Controls ---
const sliderCount = document.getElementById('slider-count');
const valCount = document.getElementById('val-count');
const sliderSize = document.getElementById('slider-size');
const valSize = document.getElementById('val-size');
const selPaint = document.getElementById('sel-paint');
const selFilter = document.getElementById('sel-filter');

sliderCount.addEventListener('input', () => {
  quadCount = parseInt(sliderCount.value);
  valCount.textContent = quadCount;
  ensureQuads();
});
sliderSize.addEventListener('input', () => {
  quadSizePx = parseInt(sliderSize.value);
  valSize.textContent = quadSizePx;
});
selPaint.addEventListener('change', () => {
  paintMode = selPaint.value;
});
selFilter.addEventListener('change', () => {
  const filter = selFilter.value === 'bilinear' ? gl.LINEAR : gl.NEAREST;
  gl.bindTexture(gl.TEXTURE_2D_ARRAY, texArray);
  gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_MIN_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D_ARRAY, gl.TEXTURE_MAG_FILTER, filter);
});

// --- Zoom & Pan ---
// View transform: clip_out = (world_pos - pan) * zoom
// pan is in world (clip) space, zoom is scalar (1 = default)
let zoom = 1;
let panX = 0, panY = 0;
let dragging = false;
let dragLastX = 0, dragLastY = 0;

// Convert screen pixel coords to clip space
function screenToClip(sx, sy) {
  return [
    (sx / canvas.clientWidth) * 2 - 1,
    -((sy / canvas.clientHeight) * 2 - 1)
  ];
}

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const [cx, cy] = screenToClip(e.clientX, e.clientY);
  // World point under cursor before zoom
  const wx = cx / zoom + panX;
  const wy = cy / zoom + panY;
  // Apply zoom
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  zoom *= factor;
  // Adjust pan so world point stays under cursor
  panX = wx - cx / zoom;
  panY = wy - cy / zoom;
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0) { dragging = true; dragLastX = e.clientX; dragLastY = e.clientY; }
});
window.addEventListener('mouseup', () => { dragging = false; });
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const dx = (e.clientX - dragLastX) / canvas.clientWidth * 2;
  const dy = -(e.clientY - dragLastY) / canvas.clientHeight * 2;
  panX -= dx / zoom;
  panY -= dy / zoom;
  dragLastX = e.clientX;
  dragLastY = e.clientY;
});

// Touch support for mobile
let touchStart = null;
let touchStartDist = 0;
let touchStartZoom = 1;
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    dragging = true;
    dragLastX = e.touches[0].clientX;
    dragLastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    dragging = false;
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    touchStartDist = Math.sqrt(dx * dx + dy * dy);
    touchStartZoom = zoom;
  }
}, { passive: true });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    const dx = (e.touches[0].clientX - dragLastX) / canvas.clientWidth * 2;
    const dy = -(e.touches[0].clientY - dragLastY) / canvas.clientHeight * 2;
    panX -= dx / zoom;
    panY -= dy / zoom;
    dragLastX = e.touches[0].clientX;
    dragLastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    zoom = touchStartZoom * (dist / touchStartDist);
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; });

// --- Simulation + render ---
let frame = 0;
let lastTime = performance.now();
let windowStart = lastTime;
let windowFrames = 0;
let avgFps = 0;
let avgFrameTime = 0;

function tick(now) {
  frame++;
  const dt = now - lastTime;
  lastTime = now;
  const dtSec = dt * 0.001;

  windowFrames++;
  const elapsed = now - windowStart;
  if (elapsed >= 1000) {
    avgFrameTime = elapsed / windowFrames;
    avgFps = windowFrames * 1000 / elapsed;
    windowStart = now;
    windowFrames = 0;
  }
  hud.textContent = `FPS: ${avgFps.toFixed(1)} (${avgFrameTime.toFixed(1)}ms) | Frame: ${frame} | Quads: ${quadCount} | ${canvas.width}x${canvas.height}`;

  // Recompute half-sizes in case of resize
  const hw = quadSizePx / canvas.width;
  const hh = quadSizePx / canvas.height;

  // Update positions (bounce off edges)
  for (let i = 0; i < quadCount; i++) {
    const q = quads[i];
    q.hw = hw;
    q.hh = hh;
    q.cx += q.vx * dtSec;
    q.cy += q.vy * dtSec;

    if (q.cx - q.hw < -1) { q.cx = -1 + q.hw; q.vx = Math.abs(q.vx); }
    if (q.cx + q.hw >  1) { q.cx =  1 - q.hw; q.vx = -Math.abs(q.vx); }
    if (q.cy - q.hh < -1) { q.cy = -1 + q.hh; q.vy = Math.abs(q.vy); }
    if (q.cy + q.hh >  1) { q.cy =  1 - q.hh; q.vy = -Math.abs(q.vy); }
  }

  gl.clearColor(0.1, 0.1, 0.1, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  const indexCount = quadCount * 4 + Math.max(0, quadCount - 1);

  if (paintMode === 'solid') {
    // Build solid vertex data
    const data = new Float32Array(quadCount * 4 * FLOATS_PER_VERT_SOLID);
    for (let i = 0; i < quadCount; i++) {
      const q = quads[i];
      const o = i * 4 * FLOATS_PER_VERT_SOLID;
      const corners = [
        q.cx - q.hw, q.cy + q.hh,
        q.cx - q.hw, q.cy - q.hh,
        q.cx + q.hw, q.cy + q.hh,
        q.cx + q.hw, q.cy - q.hh,
      ];
      for (let v = 0; v < 4; v++) {
        const vo = o + v * FLOATS_PER_VERT_SOLID;
        data[vo    ] = corners[v * 2];
        data[vo + 1] = corners[v * 2 + 1];
        data[vo + 2] = q.color[0];
        data[vo + 3] = q.color[1];
        data[vo + 4] = q.color[2];
        data[vo + 5] = q.color[3];
      }
    }

    gl.useProgram(progSolid);
    gl.uniform1f(uSolidZoom, zoom);
    gl.uniform2f(uSolidPan, panX, panY);
    gl.bindVertexArray(vaoSolid);
    gl.bindBuffer(gl.ARRAY_BUFFER, vboSolid);
    gl.bufferData(gl.ARRAY_BUFFER, data, gl.DYNAMIC_DRAW);
    gl.drawElements(gl.TRIANGLE_STRIP, indexCount, gl.UNSIGNED_SHORT, 0);
  } else {
    // Build textured vertex data
    const data = new Float32Array(quadCount * 4 * FLOATS_PER_VERT_TEX);
    const uvs = [0, 1, 0, 0, 1, 1, 1, 0]; // TL, BL, TR, BR
    for (let i = 0; i < quadCount; i++) {
      const q = quads[i];
      const o = i * 4 * FLOATS_PER_VERT_TEX;
      const corners = [
        q.cx - q.hw, q.cy + q.hh,
        q.cx - q.hw, q.cy - q.hh,
        q.cx + q.hw, q.cy + q.hh,
        q.cx + q.hw, q.cy - q.hh,
      ];
      for (let v = 0; v < 4; v++) {
        const vo = o + v * FLOATS_PER_VERT_TEX;
        data[vo    ] = corners[v * 2];
        data[vo + 1] = corners[v * 2 + 1];
        data[vo + 2] = uvs[v * 2];
        data[vo + 3] = uvs[v * 2 + 1];
        data[vo + 4] = q.imageIdx;
      }
    }

    gl.useProgram(progTex);
    gl.uniform1f(uTexZoom, zoom);
    gl.uniform2f(uTexPan, panX, panY);
    gl.uniform1i(uTexSampler, 0);
    gl.bindVertexArray(vaoTex);
    gl.bindBuffer(gl.ARRAY_BUFFER, vboTex);
    gl.bufferData(gl.ARRAY_BUFFER, data, gl.DYNAMIC_DRAW);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D_ARRAY, texArray);
    gl.drawElements(gl.TRIANGLE_STRIP, indexCount, gl.UNSIGNED_SHORT, 0);
  }

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);
</script>
</body>
</html>
