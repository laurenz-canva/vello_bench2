name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WASM_BINDGEN_VERSION: 0.2.118
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Brotli
        run: sudo apt-get update && sudo apt-get install -y brotli

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: wasm-cargo-

      - name: Cache wasm-bindgen-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-bindgen
          key: wasm-bindgen-${{ runner.os }}-${{ env.WASM_BINDGEN_VERSION }}

      - name: Install wasm-bindgen-cli
        run: |
          if ! command -v wasm-bindgen > /dev/null || ! wasm-bindgen --version | grep -q "${WASM_BINDGEN_VERSION}"; then
            cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_VERSION}" --force
          fi

      # SIMD
      - name: Build simd
        run: cargo build --target wasm32-unknown-unknown --release
        env:
          RUSTFLAGS: -Ctarget-feature=+simd128

      - name: Bindgen simd
        run: |
          wasm-bindgen --target web --out-dir dist/simd --no-typescript \
            target/wasm32-unknown-unknown/release/vello_bench2.wasm

      # no-SIMD
      - name: Build nosimd
        run: cargo build --target wasm32-unknown-unknown --release
        env:
          RUSTFLAGS: ""

      - name: Bindgen nosimd
        run: |
          wasm-bindgen --target web --out-dir dist/nosimd --no-typescript \
            target/wasm32-unknown-unknown/release/vello_bench2.wasm

      - name: Copy index.html
        run: cp web/index.html dist/index.html

      - name: Compress SVG assets
        run: |
          mkdir -p dist/assets
          for asset in assets/*.svg; do
            brotli -f -q 11 "$asset" -o "dist/assets/$(basename "$asset").br"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
