<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>bench worker</title>
</head>
<body>
  <script type="module">
    // Signal worker mode before WASM init so main() skips the full UI.
    window.__vello_worker = true;

    const { default: init, bench_worker_init } = await import("./vello_bench2.js");
    await init();
    bench_worker_init();
  </script>
</body>
</html>
