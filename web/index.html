<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vello_bench2</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-ink-950: #040814;
      --color-ink-900: #0b1220;
      --color-ink-850: #111a2b;
      --color-ink-800: #172235;
      --color-accent-cyan: #67e8f9;
      --color-accent-blue: #60a5fa;
      --color-accent-lime: #bef264;
      --color-accent-rose: #fb7185;
      --color-accent-amber: #fbbf24;
    }

    @layer base {
      html, body {
        margin: 0;
        min-height: 100%;
        background: #020617;
      }

      body {
        color: #e2e8f0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }
    }

    @layer utilities {
      .sidebar-scroll {
        scrollbar-width: thin;
        scrollbar-color: rgba(103, 232, 249, 0.45) rgba(255, 255, 255, 0.06);
      }

      .sidebar-scroll::-webkit-scrollbar {
        width: 10px;
      }

      .sidebar-scroll::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.04);
      }

      .sidebar-scroll::-webkit-scrollbar-thumb {
        background: rgba(103, 232, 249, 0.4);
        border: 2px solid rgba(2, 6, 23, 0.8);
      }

      .sidebar-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(103, 232, 249, 0.58);
      }
    }
  </style>
</head>

<body class="overflow-hidden antialiased selection:bg-cyan-300/30">
  <div id="dashboard-root" class="relative min-h-screen">
    <div
      id="canvas-stage-shell"
      class="fixed inset-x-0 top-16 bottom-0 overflow-hidden border-t border-white/10 bg-slate-950 lg:top-20"
    >
      <div id="canvas-host" class="absolute inset-0 overflow-hidden"></div>
    </div>

    <div
      id="benchmark-stage-shell"
      class="fixed inset-x-0 top-16 bottom-0 overflow-hidden border-t border-white/10 bg-slate-950 lg:top-20"
    >
      <div id="benchmark-canvas-host" class="absolute inset-0 overflow-hidden"></div>
      <div id="ab-frame-host" class="absolute inset-0 hidden overflow-hidden"></div>
    </div>

    <div id="app-overlay" class="pointer-events-none relative z-20 min-h-screen"></div>
  </div>

  <script type="module">
    const simd = localStorage.getItem("vello_bench_simd") !== "0";
    const simdStr = simd ? "simd" : "nosimd";

    // A/B variant support: when served via ab.sh, dist/ contains control/ and
    // treatment/ directories.  When served via serve.sh, it contains simd/ and
    // nosimd/ instead.  We probe for the control directory to detect ab.sh mode.
    let abMode = false;
    try {
      const probe = await fetch("./control/vello_bench2.js", { method: "HEAD" });
      abMode = probe.ok;
    } catch (_) {}

    const query = new URLSearchParams(location.search);
    const abChild = query.get("ab_child") === "1";
    const variant = location.pathname.includes("/treatment/") ? "treatment" : "control";

    const mod_path = abMode
      ? (abChild ? "./vello_bench2.js" : "./control/vello_bench2.js")
      : `./${simdStr}/vello_bench2.js`;

    if (!abMode) {
      window.__vello_simd = simd;
      window.__vello_toggle_simd = () => {
        localStorage.setItem("vello_bench_simd", simd ? "0" : "1");
        location.reload();
      };
    }

    if (abMode) {
      window.__vello_ab_mode = !abChild;
      if (abChild) {
        window.__vello_ab_child = true;
        window.__vello_variant = variant;
      }
    }

    const { default: init } = await import(mod_path);
    if (document.readyState === "complete") {
      init();
    } else {
      window.addEventListener("load", () => init());
    }
  </script>

</body>

</html>
